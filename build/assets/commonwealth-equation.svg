<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bg          { fill: #0a0a0a; }
      .title       { fill: #f0f0f0; font-family: Georgia, 'Times New Roman', serif; font-weight: 700; letter-spacing: 3px; }
      .subtitle    { fill: #999; font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
      .math        { fill: #f0f0f0; font-family: 'Cambria Math', Cambria, 'Times New Roman', Georgia, serif; }
      .math-italic { fill: #f0f0f0; font-family: 'Cambria Math', Cambria, 'Times New Roman', Georgia, serif; font-style: italic; }
      .coral       { fill: #ff7a59; }
      .green       { fill: #57c98b; }
      .muted       { fill: #888; font-family: Georgia, 'Times New Roman', serif; }
      .legend      { fill: #ccc; font-family: Georgia, 'Times New Roman', serif; }
      .footer      { fill: #666; font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="700"/>

  <!-- Title block -->
  <text class="title"    x="600" y="80"  text-anchor="middle" font-size="34">THE COMMONWEALTH EQUATION</text>
  <text class="subtitle" x="600" y="115" text-anchor="middle" font-size="16">A dollar a day. A person at a time. Together we take back our wealth.</text>

  <!-- ─── Main equation ─── -->

  <!-- V(t) = V₀ · -->
  <text class="math-italic" x="280" y="370" font-size="64">V</text>
  <text class="math"        x="312" y="370" font-size="64">(</text>
  <text class="math-italic" x="332" y="370" font-size="64">t</text>
  <text class="math"        x="358" y="370" font-size="64">)</text>
  <text class="math"        x="400" y="370" font-size="64">=</text>
  <text class="math-italic" x="455" y="370" font-size="64">V</text>
  <text class="math"        x="490" y="385" font-size="36">0</text>
  <text class="math"        x="530" y="370" font-size="50">·</text>

  <!-- Product symbol with limits -->
  <text class="muted" x="608" y="298" font-size="22" text-anchor="middle">N(t)</text>
  <text class="coral" x="610" y="395" font-size="120" text-anchor="middle">∏</text>
  <text class="muted" x="608" y="438" font-size="22" text-anchor="middle">k = 1</text>

  <!-- Fraction: (1+γ)(1+η) / (1−δ) -->
  <!-- Numerator -->
  <text class="math"        x="700" y="335" font-size="48">(1 +</text>
  <text class="math-italic coral" x="800" y="335" font-size="52">γ</text>
  <text class="math"        x="826" y="335" font-size="48">)(1 +</text>
  <text class="math-italic green" x="945" y="335" font-size="52">η</text>
  <text class="math"        x="970" y="335" font-size="48">)</text>

  <!-- Fraction bar -->
  <line x1="690" y1="358" x2="1000" y2="358" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round"/>

  <!-- Denominator -->
  <text class="math"             x="775" y="410" font-size="48">1 −</text>
  <text class="math-italic coral" x="855" y="410" font-size="52">δ</text>

  <!-- Brackets around fraction (subtle) -->
  <text class="math" x="675" y="378" font-size="120" font-weight="100">(</text>
  <text class="math" x="1010" y="378" font-size="120" font-weight="100">)</text>

  <!-- ─── Legend ─── -->

  <g transform="translate(220, 500)">
    <text class="math-italic coral" x="0"  y="0"  font-size="26">γ</text>
    <text class="legend"             x="40" y="0"  font-size="15">depth growth per cycle — buybacks, trust deployments, vault seeds</text>

    <text class="math-italic green"  x="0"  y="32" font-size="26">η</text>
    <text class="legend"             x="40" y="32" font-size="15">LP fee yield per cycle — trading volume, MEV, cross-chain arbitrage</text>

    <text class="math-italic coral"  x="0"  y="64" font-size="26">δ</text>
    <text class="legend"             x="40" y="64" font-size="15">supply contraction per cycle — vault harvests burning RKL to 0x…dEaD</text>

    <text class="math-italic muted"  x="0"  y="96" font-size="22">N(t)</text>
    <text class="legend"             x="60" y="96" font-size="15">harvest cycles elapsed since deployment = ⌊t / 29 days⌋</text>

    <text class="math-italic muted"  x="0"  y="128" font-size="22">V</text>
    <text class="muted"              x="14" y="136" font-size="14">0</text>
    <text class="legend"             x="40" y="128" font-size="15">seed value at deployment</text>
    <text class="muted"              x="320" y="128" font-size="15">·</text>
    <text class="math-italic muted"  x="345" y="128" font-size="22">V(t)</text>
    <text class="legend"             x="410" y="128" font-size="15">vault value at time t</text>
  </g>

  <!-- ─── Footer ─── -->
  <text class="footer" x="600" y="660" text-anchor="middle" font-size="14">
    Three forces compound. None require attention. None can be reversed. None expire.
  </text>
  <text class="footer" x="600" y="682" text-anchor="middle" font-size="12">
    The contracts read their own state, forever. Every cycle, wealth multiplies by (1 + γ)(1 + η) / (1 − δ).
  </text>
</svg>
